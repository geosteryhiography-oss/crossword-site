<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Кросворд - 4 школа Козятин</title>
    <style>
        body { font-family: Arial; text-align: center; background: #f5f5f5; }
        h1 { margin-top: 20px; }
        .crossword { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 20px; }
        .row { display: flex; gap: 5px; }
        input { width: 40px; height: 40px; text-align: center; font-size: 20px; }
        .clues { margin-top: 30px; font-size: 18px; }
        button { margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<h1>Кросворд: 4 школа м. Козятин</h1>

<div class="crossword">
    <div class="row" id="row1"></div>
    <div class="row" id="row2"></div>
    <div class="row" id="row3"></div>
</div>

<div class="clues">
    <p><b>1.</b> Заучка з тату герб України</p>
    <p><b>2.</b> Фамілія Ігоря Михайловича</p>
    <p><b>3.</b> Фамілія Насті</p>
</div>

<button onclick="checkAnswers()">Перевірити</button>
<p id="result"></p>

<script>
// правильні відповіді (не показуються користувачу)
const answers = [
    "КОВАЛЬОВА",
    "ПАЦАНЮРА",
    "AAAAAAAAAA" // 10 букв для Насті
];

// функція створення рядів
function createRow(rowId, length) {
    const row = document.getElementById(rowId);
    for (let i = 0; i < length; i++) {
        const input = document.createElement("input");
        input.setAttribute("maxlength", "1");
        input.dataset.row = rowId;
        input.dataset.col = i;
        row.appendChild(input);
    }
}

// створюємо ряди
createRow("row1", answers[0].length);
createRow("row2", answers[1].length);
createRow("row3", 10); // третій ряд завжди 10 клітинок

// перевірка
function checkAnswers() {
    let correct = true;
    ["row1","row2","row3"].forEach((rowId,r)=>{
        const inputs = document.querySelectorAll(`#${rowId} input`);
        inputs.forEach((input,i)=>{
            if (input.value.toUpperCase() !== answers[r][i]) correct=false;
        });
    });
    document.getElementById("result").innerText = correct ? "✅ Все правильно!" : "❌ Є помилки!";
}
</script>

</body>
</html>
